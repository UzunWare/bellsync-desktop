<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35"/>
      <stop offset="50%" style="stop-color:#0f1525"/>
      <stop offset="100%" style="stop-color:#0b1120"/>
    </linearGradient>
    
    <!-- Bell gradient -->
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="40%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Shadow for bell -->
    <filter id="bellShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.3"/>
    </filter>
    
    <!-- Outer glow for ring waves -->
    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="1" y="1" width="254" height="254" rx="55" ry="55" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Ambient glow behind bell -->
  <ellipse cx="128" cy="118" rx="70" ry="65" fill="url(#glow)"/>
  
  <!-- Sound wave arcs - left -->
  <path d="M 58 88 Q 48 108 58 128" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.3" filter="url(#waveGlow)"/>
  <path d="M 44 78 Q 30 108 44 138" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  
  <!-- Sound wave arcs - right -->
  <path d="M 198 88 Q 208 108 198 128" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.3" filter="url(#waveGlow)"/>
  <path d="M 212 78 Q 226 108 212 138" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  
  <!-- Bell body -->
  <g filter="url(#bellShadow)">
    <!-- Main bell shape -->
    <path d="
      M 92 148
      C 92 148 88 100 88 92
      C 88 70 106 52 128 52
      C 150 52 168 70 168 92
      C 168 100 164 148 164 148
      L 176 148
      C 178 148 180 150 180 152
      L 180 158
      C 180 160 178 162 176 162
      L 80 162
      C 78 162 76 160 76 158
      L 76 152
      C 76 150 78 148 80 148
      Z
    " fill="url(#bellGrad)"/>
    
    <!-- Bell top nub -->
    <circle cx="128" cy="48" r="7" fill="url(#bellGrad)"/>
    
    <!-- Bell clapper / bottom piece -->
    <path d="M 112 162 Q 112 180 128 180 Q 144 180 144 162" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Highlight on bell -->
    <path d="
      M 100 90
      C 100 74 112 62 128 62
      C 134 62 140 64 144 68
    " fill="none" stroke="#fef3c7" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Inner shadow on bell -->
    <path d="
      M 94 146
      C 94 146 90 102 90 92
      C 90 72 108 56 128 56
    " fill="none" stroke="#b45309" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  </g>
  
  <!-- "Sync" dots at bottom — three small dots suggesting timing/rhythm -->
  <circle cx="108" cy="200" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="128" cy="200" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="148" cy="200" r="4" fill="#fbbf24" opacity="0.5"/>
  
  <!-- Thin connecting line between dots -->
  <line x1="112" y1="200" x2="124" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <line x1="133" y1="200" x2="144" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Subtle corner accent -->
  <path d="M 220 28 L 228 28 L 228 36" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <path d="M 28 220 L 28 228 L 36 228" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>
